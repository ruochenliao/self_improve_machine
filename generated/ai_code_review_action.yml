# AI Code Review GitHub Action
# Drop this file into .github/workflows/ in your repo
# Get AI-powered code reviews on every Pull Request
# Powered by Silent-Nexus API — https://localhost:8402
#
# Setup: Add your API endpoint as a repository secret named AI_REVIEW_URL
# Default: Uses Silent-Nexus public API

name: AI Code Review

on:
  pull_request:
    types: [opened, synchronize]

jobs:
  ai-review:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get changed files
        id: diff
        run: |
          DIFF=$(git diff origin/${{ github.base_ref }}...HEAD -- '*.py' '*.js' '*.ts' '*.go' '*.rs' '*.java' | head -c 8000)
          echo "diff<<EOF" >> $GITHUB_OUTPUT
          echo "$DIFF" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: AI Code Review
        id: review
        run: |
          API_URL="${{ secrets.AI_REVIEW_URL || 'https://silent-nexus.trycloudflare.com' }}"
          
          RESPONSE=$(curl -s -X POST "$API_URL/code-review" \
            -H "Content-Type: application/json" \
            -d "$(jq -n --arg code "${{ steps.diff.outputs.diff }}" \
              '{code: $code, prompt: "Review this PR diff. Flag bugs, security issues, and suggest improvements. Be concise."}')")
          
          REVIEW=$(echo "$RESPONSE" | jq -r '.result // .error // "Review unavailable"')
          echo "review<<EOF" >> $GITHUB_OUTPUT
          echo "$REVIEW" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Post Review Comment
        uses: actions/github-script@v7
        with:
          script: |
            const review = `${{ steps.review.outputs.review }}`;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `## 🤖 AI Code Review\n\n${review}\n\n---\n*Powered by [Silent-Nexus API](https://github.com/SilentNexus) — $0.02/review*`
            });
