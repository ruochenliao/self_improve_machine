[agent]
name = "SIM-Agent"
version = "0.1.0"
data_dir = "data"

[llm]
default_provider = "openai"

[llm.openai]
api_key = "sk-gKpf4qNU3RD2zvQPCiwQmNRUwXM47mKPSO52Z2d5v5HuPkit"
base_url = "https://api.closeai-asia.com/v1"
models = [
    "deepseek-chat",
    "gemini-2.5-flash",
    "gpt-4o-mini",
    "gpt-4o",
    "claude-sonnet-4-20250514",
    "claude-haiku-4-5",
    "claude-3-5-haiku-latest",
]

[llm.qwen]
api_key = "sk-683c04db91314b1db8613b76420074ad"
base_url = "https://dashscope.aliyuncs.com/compatible-mode/v1"
models = [
    "qwen-turbo",
    "qwen-plus",
    "qwen-max",
]

[llm.anthropic]
# Not needed — Claude models are accessed via closeai-asia OpenAI-compatible proxy above
api_key = ""
models = []

[payment]
default_provider = "alipay"

[payment.alipay]
app_id = ""  # Set via SIM_PAYMENT_ALIPAY_APP_ID env var
private_key_path = ""  # RSA2 private key file path
alipay_public_key_path = ""  # Alipay public key file path
gateway_url = "https://openapi.alipay.com/gateway.do"
sandbox = true  # Use sandbox environment for development
notify_url = ""  # Async notification callback URL

[payment.stripe]
api_key = ""  # Set via SIM_PAYMENT__STRIPE__API_KEY env var
webhook_secret = ""  # Set via SIM_PAYMENT__STRIPE__WEBHOOK_SECRET env var

[cloud]
default_provider = "aliyun"

[cloud.aliyun]
access_key_id = ""  # Set via SIM_CLOUD_ALIYUN_ACCESS_KEY_ID env var
access_key_secret = ""  # Set via SIM_CLOUD_ALIYUN_ACCESS_KEY_SECRET env var
region_id = "cn-hangzhou"
default_instance_type = "ecs.t6-c1m1.large"
default_image_id = "ubuntu_22_04_x64_20G_alibase_20240130.vhd"
security_group_id = ""
vswitch_id = ""

[survival]
normal_threshold_usd = 100.0
low_compute_threshold_usd = 5.0
critical_threshold_usd = 0.50
enable_react_loop = true  # 开启自主推理循环，让 Agent 自主进化

[survival.intervals]
normal_heartbeat_sec = 10
low_compute_heartbeat_sec = 60
critical_heartbeat_sec = 120
normal_loop_sec = 60       # 每分钟一个 cycle，节省 token
low_compute_loop_sec = 300  # 钱少时 5 分钟一个 cycle
critical_loop_sec = 600     # 危急时 10 分钟一个 cycle

[survival.models]
normal = ["claude-sonnet-4-20250514", "gpt-4o", "deepseek-chat"]
low_compute = ["claude-haiku-4-5", "deepseek-chat", "gemini-2.5-flash", "qwen-plus"]
critical = ["deepseek-chat", "qwen-turbo"]

[memory]
chromadb_path = "data/chromadb"
top_k = 5

[income]
api_port = 8402
api_host = "0.0.0.0"
github_token = ""  # Set via SIM_INCOME__GITHUB_TOKEN env var
# Personal payment QR code URLs (for self-service key purchases)
alipay_qr_url = "/static/AliPay_receive_money_sq_code.jpg"  # URL to your Alipay personal receive QR image
wechat_qr_url = "/static/wechat_receive_money_sql_code.png"  # URL to your WeChat personal receive QR image

[self_mod]
watchdog_timeout_sec = 30
snapshot_dir = "data/snapshots"
max_snapshots = 5

# === Social Media / Promotion ===
[social.devto]
api_key = ""  # Get from https://dev.to/settings/extensions → Generate API Key

[social.reddit]
client_id = ""      # Create app at https://www.reddit.com/prefs/apps (type: script)
client_secret = ""
username = ""
password = ""

[social.twitter]
bearer_token = ""   # Get from https://developer.twitter.com/en/portal
api_key = ""
api_secret = ""
access_token = ""
access_secret = ""

# Webhooks (Slack, Discord, etc.)
# [[social.webhooks]]
# name = "discord"
# url = "https://discord.com/api/webhooks/..."
# [[social.webhooks]]
# name = "slack"
# url = "https://hooks.slack.com/services/..."

[profit_gate]
# 利润门控：Agent 自养活的铁律
enabled = true
require_confirmed_payment = true  # 必须确认收款才允许调用付费模型
min_balance_usd = 0.50            # 余额低于此值停止所有付费调用
min_gross_margin_ratio = 0.20     # 最低毛利率 20%
max_cost_per_request_usd = 0.10   # 单次请求最大成本上限（约5000 tokens deepseek-chat）
hard_stop_balance_usd = 0.10      # 硬止损余额
reinvest_ratio = 0.50             # 利润中可回投算力比例
block_free_trial_when_gated = false # 允许免费试用（获客成本）

[ddns]
enabled = true
domain = "swifthelix.asia"
rr = "@"  # "@" = root domain, "www" = www subdomain
ttl = 600  # 10 minutes
check_interval_sec = 300  # Check every 5 minutes

[creator]
# Creator revenue share configuration
share_percentage = 30  # Creator gets 30% of all income
share_pause_threshold_usd = 5.0  # Pause sharing when balance drops below this
payout_method = "alipay"  # Payment method for creator payouts
creator_account = ""  # Creator's payment account (e.g., Alipay account)
