[agent]
name = "SIM-Agent"
version = "0.1.0"
data_dir = "data"

[llm]
default_provider = "openai"

[llm.openai]
api_key = "sk-gKpf4qNU3RD2zvQPCiwQmNRUwXM47mKPSO52Z2d5v5HuPkit"
base_url = "https://api.closeai-asia.com/v1"
models = [
    "deepseek-chat",
    "gemini-2.5-flash",
    "gpt-4o-mini",
    "gpt-4o",
    "claude-sonnet-4-20250514",
]

[llm.anthropic]
api_key = ""
models = []

[payment]
default_provider = "alipay"

[payment.alipay]
app_id = ""  # Set via SIM_PAYMENT_ALIPAY_APP_ID env var
private_key_path = ""  # RSA2 private key file path
alipay_public_key_path = ""  # Alipay public key file path
gateway_url = "https://openapi.alipay.com/gateway.do"
sandbox = true  # Use sandbox environment for development
notify_url = ""  # Async notification callback URL

[payment.stripe]
api_key = ""  # Set via SIM_PAYMENT__STRIPE__API_KEY env var
webhook_secret = ""  # Set via SIM_PAYMENT__STRIPE__WEBHOOK_SECRET env var

[cloud]
default_provider = "aliyun"

[cloud.aliyun]
access_key_id = ""  # Set via SIM_CLOUD_ALIYUN_ACCESS_KEY_ID env var
access_key_secret = ""  # Set via SIM_CLOUD_ALIYUN_ACCESS_KEY_SECRET env var
region_id = "cn-hangzhou"
default_instance_type = "ecs.t6-c1m1.large"
default_image_id = "ubuntu_22_04_x64_20G_alibase_20240130.vhd"
security_group_id = ""
vswitch_id = ""

[survival]
normal_threshold_usd = 100.0
low_compute_threshold_usd = 5.0
critical_threshold_usd = 0.50

[survival.intervals]
normal_heartbeat_sec = 5
low_compute_heartbeat_sec = 60
critical_heartbeat_sec = 120
normal_loop_sec = 10
low_compute_loop_sec = 120
critical_loop_sec = 300

[survival.models]
normal = ["gpt-4o", "gpt-4o-mini", "deepseek-chat"]
low_compute = ["deepseek-chat", "gemini-2.5-flash-lite"]
critical = ["deepseek-chat"]

[memory]
chromadb_path = "data/chromadb"
top_k = 5

[income]
api_port = 8402
api_host = "0.0.0.0"
github_token = ""  # Set via SIM_INCOME__GITHUB_TOKEN env var
# Personal payment QR code URLs (for self-service key purchases)
alipay_qr_url = "/static/AliPay_receive_money_sq_code.jpg"  # URL to your Alipay personal receive QR image
wechat_qr_url = "/static/wechat_receive_money_sql_code.png"  # URL to your WeChat personal receive QR image

[self_mod]
watchdog_timeout_sec = 30
snapshot_dir = "data/snapshots"
max_snapshots = 5

[creator]
# Creator revenue share configuration
share_percentage = 30  # Creator gets 30% of all income
share_pause_threshold_usd = 5.0  # Pause sharing when balance drops below this
payout_method = "alipay"  # Payment method for creator payouts
creator_account = ""  # Creator's payment account (e.g., Alipay account)
